# ============================================================
# Art Agent — Docker Compose Configuration
# ============================================================
# Usage:
#   cp .env.example .env      # fill in your values
#   docker compose up -d      # start in background
#   docker compose logs -f    # follow logs
#   docker compose down       # stop
# ============================================================

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: art-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data      # persists SQLite database across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Redis (optional) ──────────────────────────────────────────────────────────
  # Uncomment the block below to enable Redis for caching / rate limiting.
  # The app gracefully degrades when REDIS_URL points to an unreachable host.
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: art-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 5s

volumes:
  redis_data:
